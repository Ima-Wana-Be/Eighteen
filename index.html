<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Eighteen — 8×8 Sudoku</title>
  <meta name="description" content="An 8×8 Sudoku variant where every row and column uses 1–8 and each 2×2 block totals 18." />
  <meta name="theme-color" content="#E4E8E5" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Eighteen" />
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #E4E8E5; color: #1B2A29;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #root { min-height: 100%; }
    .boot { display: flex; align-items: center; justify-content: center; min-height: 100vh;
      font-size: 14px; color: #5C6A67; }
  </style>
</head>
<body>
  <div id="root"><div class="boot">Loading Eighteen…</div></div>
  <noscript>Eighteen needs JavaScript enabled to run.</noscript>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").catch(function (e) {
          console.warn("Service worker registration failed:", e);
        });
      });
    }
  </script>
</body>
</html>
